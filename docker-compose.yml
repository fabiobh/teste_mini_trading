services:
  app:
    build:
      context: ./back_laravel
      dockerfile: Dockerfile
    container_name: minibina_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./back_laravel:/var/www
    networks:
      - minibina_net

  nginx:
    image: nginx:alpine
    container_name: minibina_nginx
    restart: unless-stopped
    ports:
      - "8001:80"
    volumes:
      - ./back_laravel:/var/www
      - ./back_laravel/docker/nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - minibina_net

networks:
  minibina_net:
    driver: bridge
